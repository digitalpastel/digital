<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel to compile JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LayoutDashboard, Users, DollarSign, Calendar, FileText, Clock, Briefcase, BriefcaseBusiness, Award, BookOpen, Plus, Trash2 } = lucide;

        function App() {
            const [activeView, setActiveView] = useState('dashboard');
            const [data, setData] = useState({
                claims: [{ id: 1, name: 'John Doe', amount: '150', status: 'Pending' }],
                timesheet: [{ id: 1, name: 'John Doe', hours: '8', date: '2026-07-08' }],
                schedule: [{ id: 1, name: 'John Doe', shift: 'Morning' }],
                recruitment: [{ id: 1, candidate: 'Jane Smith', role: 'Dev', status: 'Interview' }],
                reports: [{ id: 1, report: 'Q2 Payroll', date: '2026-07-01' }],
                appraisal: [{ id: 1, name: 'John Doe', score: 'A' }],
                lnd: [{ id: 1, course: 'Leadership', status: 'Enrolled' }]
            });

            const renderEditableTable = (module) => {
                const rows = data[module];
                const addRow = () => setData(prev => ({ ...prev, [module]: [...prev[module], { id: Date.now() }] }));
                const deleteRow = (id) => setData(prev => ({ ...prev, [module]: prev[module].filter(r => r.id !== id) }));

                return (
                    <div className="bg-white p-6 rounded-xl shadow-sm border">
                        <div className="flex justify-between mb-4">
                            <h2 className="text-xl font-bold capitalize">{module} Management</h2>
                            <button onClick={addRow} className="bg-emerald-600 text-white p-2 rounded"><Plus size={16}/></button>
                        </div>
                        <table className="w-full text-left">
                            <tbody>{rows.map(row => (
                                <tr key={row.id} className="border-b">
                                    <td className="p-2"><input placeholder="Enter value..." className="outline-none w-full" /></td>
                                    <td className="text-right"><button onClick={() => deleteRow(row.id)}><Trash2 size={16} className="text-red-500"/></button></td>
                                </tr>
                            ))}</tbody>
                        </table>
                    </div>
                );
            };

            const SidebarItem = ({ id, label, icon: Icon }) => (
                <button onClick={() => setActiveView(id)} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeView === id ? 'bg-orange-50 text-orange-600' : 'text-gray-600'}`}>
                    <Icon size={20} /> {label}
                </button>
            );

            return (
                <div className="min-h-screen bg-gray-50 flex">
                    <aside className="w-64 bg-white p-6 border-r">
                        <h1 className="text-2xl font-bold mb-8 text-orange-500">QuickHR</h1>
                        <nav className="space-y-1">
                            <SidebarItem id="dashboard" label="Dashboard" icon={LayoutDashboard} />
                            <SidebarItem id="employees" label="Employees" icon={Users} />
                            <SidebarItem id="payroll" label="Payroll" icon={DollarSign} />
                            <SidebarItem id="claims" label="Claims" icon={FileText} />
                            <SidebarItem id="timesheet" label="Timesheet" icon={Clock} />
                            <SidebarItem id="schedule" label="Schedule" icon={Calendar} />
                            <SidebarItem id="recruitment" label="Recruitment" icon={Briefcase} />
                            <SidebarItem id="reports" label="Reports" icon={BriefcaseBusiness} />
                            <SidebarItem id="appraisal" label="Appraisal" icon={Award} />
                            <SidebarItem id="lnd" label="LND" icon={BookOpen} />
                        </nav>
                    </aside>
                    <main className="flex-1 p-8">
                        {activeView === 'dashboard' ? (
                            <div className="text-center p-20 text-gray-500">Dashboard Content Loaded</div>
                        ) : (
                            renderEditableTable(activeView)
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
