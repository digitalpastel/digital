<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bijak Prasekolah Companion App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .animate-spin-slow { animation: spin 12s linear infinite; }
    #cloud-sync-status { transition: opacity 0.3s ease; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-sky-100 via-pink-50 to-amber-50 text-slate-800 font-sans flex flex-col justify-between overflow-x-hidden">

  <!-- HEADER -->
  <header class="bg-white/90 backdrop-blur-md shadow-md sticky top-0 z-40 px-4 py-3 rounded-b-3xl">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-4xl animate-bounce">🎒</span>
        <div>
          <h1 class="text-xl font-black text-rose-500">BIJAK PRASEKOLAH</h1>
          <p class="text-[10px] text-slate-500 font-bold" id="header-user-name">Sila Log Masuk</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <!-- Cloud Sync Status -->
        <div id="cloud-sync-status" class="hidden flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-200 text-[10px] font-bold">
          <i data-lucide="cloud" class="w-3.5 h-3.5"></i>
          <span id="sync-text">Diselaraskan</span>
        </div>
        <button id="lang-toggle-btn" onclick="toggleLanguage()" class="px-3 py-1.5 rounded-full text-xs font-bold bg-white border border-slate-200">🌐 BM</button>
        <button id="logout-btn" onclick="performLogout()" class="hidden px-3 py-1.5 rounded-full text-xs font-bold bg-rose-500 text-white">Keluar</button>
      </div>
    </div>
  </header>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="fixed inset-0 bg-sky-100 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full space-y-6">
      <div class="text-center">
        <h2 class="text-2xl font-black text-rose-500">Log Masuk Cilik</h2>
        <p class="text-slate-500 text-sm">Sila masukkan maklumat anda</p>
      </div>
      <div class="space-y-4">
        <input type="text" id="auth-kid-name" placeholder="Nama Anak" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-rose-300">
        <input type="text" id="auth-code" placeholder="Kod Pembelian" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-rose-300">
        <button onclick="attemptLogin()" class="w-full bg-rose-500 text-white font-black py-3 rounded-xl hover:bg-rose-600 transition">Mula Belajar</button>
        <div id="auth-error" class="text-rose-500 text-xs font-bold text-center hidden">Kod tidak sah atau sesi sedang aktif!</div>
        <a href="https://wa.me/60138973700" target="_blank" class="block text-center text-xs text-blue-500 underline font-bold">Hubungi Admin untuk Kod Pembelian</a>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <main id="app-main" class="flex-grow max-w-5xl w-full mx-auto p-4 hidden">
    <div id="dashboard-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 py-4">
      <!-- Dashboard content injected here -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-800 text-slate-400 text-center py-6 px-4 mt-8 rounded-t-3xl">
    <p class="text-xs font-bold">2026 © Brandworkz Co.</p>
  </footer>

  <script>
    const state = { kidName: '', isAuthenticated: false, stars: 5, quizScores: Array(10).fill(null) };

    // Cloud Sync Simulation
    const syncStatusEl = document.getElementById('cloud-sync-status');
    const syncText = document.getElementById('sync-text');

    const simulateCloudSave = (kid, data) => {
      syncStatusEl.classList.remove('hidden');
      syncText.textContent = "Menyimpan ke Awan...";
      return new Promise((r) => setTimeout(() => {
        localStorage.setItem('bijak_data_' + kid, JSON.stringify(data));
        syncText.textContent = "Diselaraskan";
        setTimeout(() => syncStatusEl.classList.add('hidden'), 2000);
        r();
      }, 1000));
    };

    const attemptLogin = () => {
      const name = document.getElementById('auth-kid-name').value.trim();
      const code = document.getElementById('auth-code').value.trim().replace(/\s/g, '');
      
      if(name && code === 'BIJAK2026') {
        if(localStorage.getItem('bijak_active_session')) {
          document.getElementById('auth-error').textContent = "Kod sedang digunakan pada skrin lain!";
          document.getElementById('auth-error').classList.remove('hidden');
          return;
        }
        state.kidName = name;
        state.isAuthenticated = true;
        localStorage.setItem('bijak_active_session', 'true');
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-main').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('header-user-name').textContent = "Hai, " + name;
        renderDashboard();
      } else {
        document.getElementById('auth-error').textContent = "Nama atau Kod Pembelian tidak sah!";
        document.getElementById('auth-error').classList.remove('hidden');
      }
    };

    const performLogout = async () => {
      await simulateCloudSave(state.kidName, state);
      localStorage.removeItem('bijak_active_session');
      location.reload();
    };

    const renderDashboard = () => {
      const dashboard = document.getElementById('dashboard-content');
      dashboard.innerHTML = `
        <div class="col-span-full bg-blue-900 p-6 rounded-3xl text-white shadow-xl mb-4">
            <h2 class="text-2xl font-black">My Calendar / Kalendar Saya</h2>
            <div class="grid grid-cols-7 gap-2 mt-4" id="calendar-sticker-grid">
               <!-- Sticker Calendar Logic Here -->
            </div>
        </div>
      `;
      // Adding standard pillar buttons next...
    };

    lucide.createIcons();
  </script>
</body>
</html>
